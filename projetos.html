<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <style>
        .navbar-burger {
            margin-left: 0 !important;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar for Desktop and Mobile -->
    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="navbar-start">
            <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </a>
        </div>
        <div id="navbarBasicExample" class="navbar-menu">
            <div class="navbar-start">
                <a class="navbar-item" href="index.html#about-me">Sobre mim</a>
                <a class="navbar-item" href="habilidades.html">Habilidades</a>
                <a class="navbar-item" href="projetos.html">Projetos</a>
                <a class="navbar-item" href="contatos.html">Contato</a>
            </div>
        </div>
        <div class="navbar-end">
            <h3 class="navbar-item is-size-5">Olá! Me chamo Paulo Matheus!</h3>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);
            if ($navbarBurgers.length > 0) {
                $navbarBurgers.forEach( el => {
                    el.addEventListener('click', () => {
                        const target = el.dataset.target;
                        const $target = document.getElementById(target);
                        el.classList.toggle('is-active');
                        $target.classList.toggle('is-active');
                    });
                });
            }
        });
    </script>
</body>
</html>
